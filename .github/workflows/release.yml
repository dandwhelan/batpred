name: Create release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v712.01)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --generate-notes
